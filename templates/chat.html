<!DOCTYPE html>
<html>
<head>
    <title>Чат с медиа</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { font-family: Arial; max-width: 800px; margin: auto; }
        #messages { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .message { margin: 5px 0; }
        .username { font-weight: bold; color: #2c3e50; }
        .timestamp { font-size: 0.7em; color: gray; margin-left: 10px; }
        img { max-width: 200px; max-height: 200px; }
        audio { max-width: 200px; }
        #controls button { margin: 5px; }
    </style>
</head>
<body>
    <h2>Чат: {{ username }}</h2>
    <button id="logoutBtn">Выйти</button>
    <div id="messages">
        {% for msg in messages %}
            <div class="message">
                <span class="username">{{ msg.user.username }}:</span>
                {% if msg.content %}<span>{{ msg.content }}</span>{% endif %}
                {% if msg.file_type == 'image' %}
                    <img src="{{ msg.file_url }}" alt="image">
                {% elif msg.file_type == 'audio' %}
                    <audio controls src="{{ msg.file_url }}"></audio>
                {% endif %}
                <span class="timestamp">{{ msg.timestamp.strftime('%H:%M') }}</span>
            </div>
        {% endfor %}
    </div>
    <div id="controls">
        <input type="text" id="messageInput" placeholder="Текст..." style="width: 60%;">
        <button id="sendBtn">Отправить</button>
        <input type="file" id="imageInput" accept="image/*">
        <button id="uploadImageBtn">📷 Изображение</button>
        <button id="recordBtn">🎤 Записать голосовое</button>
        <button id="stopRecordBtn" disabled>⏹️ Остановить</button>
    </div>

    <script>
        const socket = io();
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const imageInput = document.getElementById('imageInput');
        const uploadImageBtn = document.getElementById('uploadImageBtn');
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopRecordBtn');

        let mediaRecorder;
        let audioChunks = [];

        // получение нового сообщения
        socket.on('new_message', (msg) => {
            appendMessage(msg.username, msg.text, msg.file_url, msg.file_type, msg.timestamp);
        });

        function appendMessage(username, text, fileUrl, fileType, timestamp) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<span class="username">${username}:</span> 
                             ${text ? `<span>${text}</span>` : ''}
                             ${fileType === 'image' ? `<br><img src="${fileUrl}">` : ''}
                             ${fileType === 'audio' ? `<br><audio controls src="${fileUrl}"></audio>` : ''}
                             <span class="timestamp">${timestamp}</span>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // отправка текстового сообщения
        sendBtn.onclick = () => {
            const text = messageInput.value.trim();
            if (text) {
                socket.emit('message', { text, room: 'general' });
                messageInput.value = '';
            }
        };

        // загрузка изображения
        uploadImageBtn.onclick = async () => {
            const file = imageInput.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.file_url) {
                socket.emit('message', { text: '', file_url: data.file_url, file_type: 'image', room: 'general' });
            }
            imageInput.value = '';
        };

        // запись голосового
        recordBtn.onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const formData = new FormData();
                formData.append('file', audioBlob, 'voice.webm');
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.file_url) {
                    socket.emit('message', { text: '', file_url: data.file_url, file_type: 'audio', room: 'general' });
                }
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start();
            recordBtn.disabled = true;
            stopBtn.disabled = false;
        };

        stopBtn.onclick = () => {
            mediaRecorder.stop();
            recordBtn.disabled = false;
            stopBtn.disabled = true;
        };

        document.getElementById('logoutBtn').onclick = () => {
            window.location.href = '/logout';
        };
    </script>
</body>
</html>
