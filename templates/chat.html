<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Чат - {{ user.username }}</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            height: 100vh;
            display: flex;
        }
        /* Сайдбар */
        .sidebar {
            width: 280px;
            background: #16213e;
            border-right: 1px solid #2a2a4a;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .user-card {
            padding: 20px;
            text-align: center;
            background: #0f3460;
            cursor: pointer;
        }
        .avatar {
            width: 60px;
            height: 60px;
            background: #667eea;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .section {
            padding: 15px;
            border-bottom: 1px solid #2a2a4a;
        }
        .section-title {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }
        .room-item, .user-item, .friend-item {
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 8px;
            cursor: pointer;
            background: #0f3460;
            transition: 0.1s;
        }
        .room-item:hover, .user-item:hover, .friend-item:hover {
            background: #667eea;
        }
        .room-item.active {
            background: #667eea;
        }
        .online-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        /* Чат */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 20px;
            background: #16213e;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .msg-avatar {
            width: 32px;
            height: 32px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            overflow: hidden;
        }
        .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .msg-content {
            background: #0f3460;
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 70%;
        }
        .msg-username {
            font-weight: bold;
            color: #667eea;
            margin-right: 8px;
            cursor: pointer;
        }
        .msg-time {
            font-size: 10px;
            color: #aaa;
        }
        .msg-text {
            word-wrap: break-word;
        }
        .msg-image {
            max-width: 200px;
            border-radius: 8px;
            cursor: pointer;
        }
        .typing {
            padding: 5px 20px;
            font-size: 12px;
            color: #aaa;
            min-height: 30px;
        }
        .controls {
            padding: 15px;
            background: #16213e;
            display: flex;
            gap: 10px;
            border-top: 1px solid #2a2a4a;
        }
        #messageInput {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 24px;
            background: #0f3460;
            color: white;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            border: none;
            border-radius: 24px;
            color: white;
            cursor: pointer;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #16213e;
            padding: 20px;
            border-radius: 16px;
            width: 300px;
            text-align: center;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #0f3460;
            border: none;
            border-radius: 8px;
            color: white;
        }
        .hidden { display: none; }
        .settings-fab {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #667eea;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="user-card" onclick="window.open('/profile', '_blank')">
        <div class="avatar">{% if user.avatar %}<img src="{{ user.avatar }}">{% else %}👤{% endif %}</div>
        <div><strong>{{ user.username }}</strong></div>
        <div style="font-size: 11px;">ID: {{ user.user_id_display }}</div>
    </div>
    <div class="section">
        <div class="section-title">📌 Комнаты 
            <button onclick="showCreateRoomModal()" style="float:right; padding:2px 8px; font-size:12px;">+</button>
        </div>
        <div id="roomsList"></div>
    </div>
    <div class="section">
        <div class="section-title">💬 Личные сообщения</div>
        <div id="privateChatsList"></div>
    </div>
    <div class="section">
        <div class="section-title">👥 Друзья <span id="friendRequestsBadge"></span></div>
        <div id="friendsList"></div>
    </div>
    <div class="section">
        <div class="section-title">🌐 Пользователи онлайн (<span id="onlineCount">0</span>)</div>
        <div id="usersList"></div>
    </div>
</div>

<div class="chat">
    <div class="chat-header">
        <span id="currentRoomName">Общий чат</span>
        <div>
            <span id="notifIcon" style="cursor:pointer; margin-right:15px;">🔔<span id="notifBadge"></span></span>
            <button onclick="location.href='/logout'">Выйти</button>
        </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="typing" id="typingIndicator"></div>
    <div class="controls">
        <input type="text" id="messageInput" placeholder="Введите сообщение...">
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <button id="imageBtn">📷</button>
        <button id="sendBtn">Отправить</button>
    </div>
</div>

<div class="settings-fab" onclick="openSettingsModal()">⚙️</div>

<script>
    const socket = io();
    let currentRoomId = null;
    let currentRoomType = 'room'; // room или private
    let currentPrivateWith = null;
    let typingTimeout = null;
    let currentUserId = {{ user.id }};
    let currentUserRole = '{{ user.role }}';

    // Вспомогательные
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    function showModal(title, contentHtml, onClose) {
        let modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>${escapeHtml(title)}</h3>${contentHtml}<button onclick="this.closest('.modal').remove()">Закрыть</button></div>`;
        document.body.appendChild(modal);
        return modal;
    }
    function showToast(msg, isError = false) {
        let toast = document.createElement('div');
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.right = '20px';
        toast.style.background = isError ? '#ef4444' : '#4ade80';
        toast.style.color = '#1a1a2e';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '8px';
        toast.style.zIndex = '2000';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    // Загрузка данных
    function loadRooms() {
        fetch('/get_rooms').then(r => r.json()).then(rooms => {
            let container = document.getElementById('roomsList');
            container.innerHTML = '';
            rooms.forEach(room => {
                let active = (currentRoomType === 'room' && currentRoomId === room.id);
                container.innerHTML += `<div class="room-item ${active ? 'active' : ''}" data-room-id="${room.id}" data-room-name="${escapeHtml(room.name)}"><span>${room.is_default ? '#' : '🔵'} ${escapeHtml(room.name)}</span><div style="float:right;">${!room.is_default ? `<button onclick="event.stopPropagation(); renameRoom(${room.id})">✏️</button> <button onclick="event.stopPropagation(); deleteRoom(${room.id})">🗑️</button>` : ''}</div></div>`;
            });
            document.querySelectorAll('.room-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if(e.target.tagName === 'BUTTON') return;
                    let rid = parseInt(el.dataset.roomId);
                    let rname = el.dataset.roomName;
                    currentRoomType = 'room';
                    currentRoomId = rid;
                    currentPrivateWith = null;
                    document.getElementById('currentRoomName').innerText = rname;
                    document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
                    el.classList.add('active');
                    loadMessages(rid);
                    socket.emit('join_room', { room_id: rid });
                });
            });
            if (!currentRoomId && rooms.length) {
                let first = rooms.find(r => r.is_default) || rooms[0];
                document.querySelector(`.room-item[data-room-id="${first.id}"]`).click();
            }
        });
    }
    function loadMessages(roomId) {
        fetch(`/get_messages?room_id=${roomId}`).then(r => r.json()).then(messages => {
            let container = document.getElementById('messages');
            container.innerHTML = '';
            messages.forEach(msg => appendMessage(msg));
            container.scrollTop = container.scrollHeight;
        });
    }
    function appendMessage(msg) {
        let container = document.getElementById('messages');
        let div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = `
            <div class="msg-avatar">${msg.avatar ? `<img src="${msg.avatar}">` : '👤'}</div>
            <div class="msg-content">
                <div><span class="msg-username" onclick="openUserProfile(${msg.user_id})">${escapeHtml(msg.username)}</span><span class="msg-time"> ${msg.timestamp}</span></div>
                <div class="msg-text">${escapeHtml(msg.text)}</div>
                ${msg.file_url ? `<img class="msg-image" src="${msg.file_url}" onclick="window.open('${msg.file_url}')">` : ''}
            </div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    function loadUsers() {
        fetch('/get_users').then(r => r.json()).then(users => {
            let container = document.getElementById('usersList');
            let online = users.filter(u => u.status === 'online');
            document.getElementById('onlineCount').innerText = online.length;
            container.innerHTML = '';
            online.forEach(user => {
                container.innerHTML += `<div class="user-item" onclick="openUserProfile(${user.id})"><span class="online-dot"></span> ${escapeHtml(user.username)}</div>`;
            });
        });
    }
    function loadFriends() {
        fetch('/get_friends').then(r => r.json()).then(friends => {
            let container = document.getElementById('friendsList');
            if (friends.length === 0) {
                container.innerHTML = '<div style="font-size:12px;color:#aaa;">Нет друзей</div>';
                return;
            }
            container.innerHTML = '';
            friends.forEach(f => {
                container.innerHTML += `<div class="friend-item" onclick="openUserProfile(${f.id})">👤 ${escapeHtml(f.username)}</div>`;
            });
        });
        fetch('/get_friend_requests').then(r => r.json()).then(reqs => {
            let badge = document.getElementById('friendRequestsBadge');
            if (reqs.length) {
                badge.innerHTML = `<span style="background:red; padding:2px 6px; border-radius:10px; font-size:10px; margin-left:5px;">${reqs.length}</span>`;
            } else {
                badge.innerHTML = '';
            }
        });
    }
    function loadPrivateChats() {
        fetch('/get_friends').then(r => r.json()).then(friends => {
            let container = document.getElementById('privateChatsList');
            container.innerHTML = '';
            friends.forEach(f => {
                container.innerHTML += `<div class="friend-item" onclick="startPrivateChat(${f.id})">💬 ${escapeHtml(f.username)}</div>`;
            });
        });
    }
    function loadNotifications() {
        fetch('/get_notifications').then(r => r.json()).then(notifs => {
            let badge = document.getElementById('notifBadge');
            if (notifs.length) {
                badge.innerText = notifs.length;
                badge.style.background = 'red';
                badge.style.padding = '2px 6px';
                badge.style.borderRadius = '10px';
                badge.style.fontSize = '10px';
                badge.style.marginLeft = '5px';
            } else {
                badge.innerText = '';
            }
        });
    }
    function openUserProfile(userId) {
        window.open(`/user/${userId}`, '_blank', 'width=500,height=600');
    }
    function startPrivateChat(userId) {
        currentRoomType = 'private';
        currentPrivateWith = userId;
        currentRoomId = null;
        document.getElementById('currentRoomName').innerText = `Личный чат с пользователем`;
        loadPrivateMessages(userId);
        socket.emit('join_private', { user_id: userId });
        socket.emit('join_private', { user_id: currentUserId });
    }
    function loadPrivateMessages(withUser) {
        fetch(`/get_private_messages?with_user=${withUser}`).then(r => r.json()).then(msgs => {
            let container = document.getElementById('messages');
            container.innerHTML = '';
            msgs.forEach(msg => {
                let div = document.createElement('div');
                div.className = 'message';
                div.innerHTML = `
                    <div class="msg-avatar">👤</div>
                    <div class="msg-content">
                        <div><span class="msg-username">${escapeHtml(msg.from_username)}</span><span class="msg-time"> ${msg.timestamp}</span></div>
                        <div class="msg-text">${escapeHtml(msg.text)}</div>
                    </div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        });
    }
    // Создание/редактирование комнат
    function showCreateRoomModal() {
        let name = prompt('Введите название комнаты:');
        if (name && name.trim()) {
            fetch('/create_room', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: name.trim()})
            }).then(r => r.json()).then(data => {
                if (data.success) showToast('Комната создана');
                else showToast(data.error, true);
                loadRooms();
            });
        }
    }
    function renameRoom(roomId) {
        let newName = prompt('Введите новое название:');
        if (newName && newName.trim()) {
            fetch('/rename_room', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({room_id: roomId, new_name: newName.trim()})
            }).then(r => r.json()).then(data => {
                if (data.success) showToast('Переименовано');
                else showToast(data.error, true);
                loadRooms();
            });
        }
    }
    function deleteRoom(roomId) {
        if (confirm('Удалить комнату?')) {
            fetch('/delete_room', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({room_id: roomId})
            }).then(r => r.json()).then(data => {
                if (data.success) showToast('Комната удалена');
                else showToast(data.error, true);
                loadRooms();
            });
        }
    }
    function openSettingsModal() {
        let themes = `
            <div style="display:flex; gap:10px; margin:15px 0;">
                <button onclick="changeTheme('dark')">🌙 Тёмная</button>
                <button onclick="changeTheme('light')">☀️ Светлая</button>
                <button onclick="changeTheme('purple')">💜 Фиолетовая</button>
                <button onclick="changeTheme('blue')">💙 Синяя</button>
            </div>
        `;
        let modal = showModal('Настройки', themes, null);
        window.changeTheme = function(theme) {
            fetch('/update_profile', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `theme=${theme}`
            }).then(() => {
                document.body.className = theme;
                showToast('Тема изменена');
                modal.remove();
            });
        };
    }
    // Socket события
    socket.on('new_message', (msg) => {
        if (currentRoomType === 'room' && currentRoomId === msg.room_id) {
            appendMessage(msg);
        }
    });
    socket.on('new_private', (msg) => {
        if (currentRoomType === 'private' && (msg.from_user === currentPrivateWith || msg.from_user === currentUserId)) {
            appendMessage({username: msg.from_username, user_id: msg.from_user, text: msg.text, file_url: '', timestamp: msg.timestamp, avatar: ''});
        }
    });
    socket.on('user_online', () => { loadUsers(); });
    socket.on('user_offline', () => { loadUsers(); });
    socket.on('room_created', () => loadRooms());
    socket.on('room_renamed', () => loadRooms());
    socket.on('room_deleted', () => loadRooms());
    socket.on('user_typing', (data) => {
        let typingDiv = document.getElementById('typingIndicator');
        if (data.room_id === currentRoomId && data.is_typing) {
            typingDiv.innerText = `${data.username} печатает...`;
            setTimeout(() => typingDiv.innerText = '', 2000);
        }
    });
    // Отправка сообщений
    document.getElementById('sendBtn').onclick = () => {
        let input = document.getElementById('messageInput');
        let text = input.value.trim();
        if (!text) return;
        if (currentRoomType === 'room' && currentRoomId) {
            socket.emit('send_message', { room_id: currentRoomId, text: text });
        } else if (currentRoomType === 'private' && currentPrivateWith) {
            socket.emit('send_private', { to_user: currentPrivateWith, text: text });
        }
        input.value = '';
    };
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('sendBtn').click();
    });
    let isTyping = false;
    document.getElementById('messageInput').addEventListener('input', () => {
        if (!isTyping && currentRoomId) {
            isTyping = true;
            socket.emit('typing', { room_id: currentRoomId, is_typing: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                isTyping = false;
                socket.emit('typing', { room_id: currentRoomId, is_typing: false });
            }, 1000);
        }
    });
    // Загрузка изображений
    document.getElementById('imageBtn').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = async (e) => {
        let file = e.target.files[0];
        if (!file) return;
        let fd = new FormData();
        fd.append('file', file);
        let res = await fetch('/upload', { method: 'POST', body: fd });
        let data = await res.json();
        if (data.url) {
            if (currentRoomType === 'room' && currentRoomId) {
                socket.emit('send_message', { room_id: currentRoomId, file_url: data.url });
            } else if (currentRoomType === 'private' && currentPrivateWith) {
                socket.emit('send_private', { to_user: currentPrivateWith, file_url: data.url });
            }
        }
    };
    // Уведомления
    document.getElementById('notifIcon').onclick = () => {
        fetch('/get_notifications').then(r => r.json()).then(notifs => {
            let html = '<ul style="text-align:left">';
            notifs.forEach(n => {
                html += `<li>${escapeHtml(n.message)} <a href="${n.link}" target="_blank">Перейти</a> <button onclick="markRead(${n.id})">✓</button></li>`;
            });
            html += '</ul>';
            showModal('Уведомления', html, null);
        });
    };
    window.markRead = (id) => {
        fetch('/notifications/read', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({id: id}) }).then(() => loadNotifications());
    };
    // Инициализация
    loadRooms();
    loadUsers();
    loadFriends();
    loadPrivateChats();
    loadNotifications();
    setInterval(() => {
        loadUsers();
        loadNotifications();
        loadFriends();
    }, 10000);
    // Тема из профиля
    document.body.className = '{{ user.theme }}';
</script>
</body>
</html>
