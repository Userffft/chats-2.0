<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ChatVerse - Регистрация</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center}
        .container{background:white;padding:40px;border-radius:20px;width:400px}
        h2{text-align:center;margin-bottom:30px}
        input,textarea{width:100%;padding:12px;margin:10px 0;border:2px solid #e0e0e0;border-radius:10px}
        button{width:100%;padding:12px;background:#667eea;color:white;border:none;border-radius:10px;cursor:pointer}
        .error{color:red;text-align:center;margin-bottom:15px}
        .info{background:#e3f2fd;padding:10px;border-radius:10px;margin-bottom:15px;font-size:14px;text-align:center}
        .footer{text-align:center;margin-top:20px}
        .footer a{color:#667eea}
    </style>
</head>
<body>
<div class="container">
    <h2>📝 Регистрация</h2>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <div class="info">Вы получите уникальный ID (4-8 символов)</div>
    <form method="post">
        <input type="text" name="username" placeholder="Имя пользователя" required>
        <textarea name="bio" placeholder="О себе"></textarea>
        <input type="password" name="password" placeholder="Пароль" required>
        <input type="password" name="confirm_password" placeholder="Подтвердите пароль" required>
        <button type="submit">Зарегистрироваться</button>
    </form>
    <div class="footer"><a href="/login">Уже есть аккаунт? Войти</a></div>
</div>
</body>
</html>
