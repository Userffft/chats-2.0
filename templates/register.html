<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Регистрация - ChatVerse</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #16213e;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            color: white;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: white;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .error {
            color: #ef4444;
            margin-bottom: 15px;
        }
        a {
            color: #aaa;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Регистрация</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="post">
            <input type="text" name="username" placeholder="Имя пользователя" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <input type="password" name="confirm_password" placeholder="Повторите пароль" required>
            <button type="submit">Зарегистрироваться</button>
        </form>
        <p style="margin-top: 20px;"><a href="/login">Уже есть аккаунт? Войти</a></p>
    </div>
</body>
</html>
